pluginManagement {
    resolutionStrategy {
        eachPlugin {
            if (requested.id.id == 'fabric-loom') {
                useVersion('1.11-SNAPSHOT')
            }
        }
    }
    repositories {
        maven {
            name = 'Fabric'
            url = 'https://maven.fabricmc.net/'
        }
        gradlePluginPortal()
    }
}
